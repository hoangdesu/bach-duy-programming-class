      async function startGeneration() {
    const outputDiv = document.getElementById('output');
    
    try {
      const response = await fetch('http://localhost:11434/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'llama3.1:8b',
          prompt: 'Why is the sky blue?',
          stream: true,
        }),
      });

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        // Decode the current chunk of data
        const chunk = decoder.decode(value, { stream: true });
        
        // Ollama sends chunks as stringified JSON objects
        try {
          const json = JSON.parse(chunk);
          
          // Append the 'response' piece to the HTML element
          if (json.response) {
            outputDiv.textContent += json.response;
          }
        } catch (e) {
          // If a chunk contains multiple JSON objects, this simple parse might fail.
          // For a more robust version, split by newlines:
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (!line.trim()) continue;
            const parsedLine = JSON.parse(line);
            outputDiv.textContent += parsedLine.response;
          }
        }
      }
    } catch (err) {
      console.error('Error:', err);
      outputDiv.textContent = "Error connecting to Ollama. Make sure it is running!";
    }
  }

  startGeneration();

  </script>
